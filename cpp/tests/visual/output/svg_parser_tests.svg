<line x1="0" y1="800" x2="700" y2="800" stroke="#eee" stroke-width="0.5" />
<text x="0" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start">1. M+L — open polyline, 4 pts 3 segs</text> 
<line x1="50" y1="100" x2="200" y2="60" stroke="#000" stroke-width="2" />
<line x1="200" y1="60" x2="350" y2="120" stroke="#000" stroke-width="2" />
<line x1="350" y1="120" x2="500" y2="50" stroke="#000" stroke-width="2" />
<circle cx="50" cy="100" r="4" fill="#2196F3"/> 
<circle cx="200" cy="60" r="4" fill="#2196F3"/> 
<circle cx="350" cy="120" r="4" fill="#2196F3"/> 
<circle cx="500" cy="50" r="4" fill="#2196F3"/> 
<rect x="50" y="50" width="450" height="70" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="50" cy="50" r="3" fill="#00f"/> 
<circle cx="500" cy="50" r="3" fill="#00f"/> 
<circle cx="50" cy="120" r="3" fill="#00f"/> 
<circle cx="500" cy="120" r="3" fill="#00f"/> 
<text x="0" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start">2. M+L+Z — closed triangle, 4th seg back to P0</text> 
<line x1="80" y1="280" x2="300" y2="200" stroke="#000" stroke-width="2" />
<line x1="300" y1="200" x2="520" y2="280" stroke="#000" stroke-width="2" />
<line x1="520" y1="280" x2="80" y2="280" stroke="#000" stroke-width="2" />
<circle cx="80" cy="280" r="4" fill="#2196F3"/> 
<circle cx="300" cy="200" r="4" fill="#2196F3"/> 
<circle cx="520" cy="280" r="4" fill="#2196F3"/> 
<rect x="80" y="200" width="440" height="80" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="80" cy="200" r="3" fill="#00f"/> 
<circle cx="520" cy="200" r="3" fill="#00f"/> 
<circle cx="80" cy="280" r="3" fill="#00f"/> 
<circle cx="520" cy="280" r="3" fill="#00f"/> 
<text x="0" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start">3. M+C — cubic bezier, arch shape, bbox above endpoints</text> 
<path d="M60 480 C 150 380 350 380 500 480" stroke="#000" stroke-width="2" fill="none"/>
<circle cx="60" cy="480" r="4" fill="#2196F3"/> 
<circle cx="500" cy="480" r="4" fill="#2196F3"/> 
<rect x="60" y="405" width="440" height="75" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="60" cy="405" r="3" fill="#00f"/> 
<circle cx="500" cy="405" r="3" fill="#00f"/> 
<circle cx="60" cy="480" r="3" fill="#00f"/> 
<circle cx="500" cy="480" r="3" fill="#00f"/> 
<text x="0" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start">4. Two M commands — two separate closed subpaths</text> 
<line x1="60" y1="640" x2="250" y2="580" stroke="#000" stroke-width="2" />
<line x1="250" y1="580" x2="250" y2="700" stroke="#000" stroke-width="2" />
<line x1="250" y1="700" x2="60" y2="640" stroke="#000" stroke-width="2" />
<circle cx="60" cy="640" r="4" fill="#2196F3"/> 
<circle cx="250" cy="580" r="4" fill="#2196F3"/> 
<circle cx="250" cy="700" r="4" fill="#2196F3"/> 
<rect x="60" y="580" width="190" height="120" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="60" cy="580" r="3" fill="#00f"/> 
<circle cx="250" cy="580" r="3" fill="#00f"/> 
<circle cx="60" cy="700" r="3" fill="#00f"/> 
<circle cx="250" cy="700" r="3" fill="#00f"/> 
<line x1="350" y1="640" x2="540" y2="580" stroke="#000" stroke-width="2" />
<line x1="540" y1="580" x2="540" y2="700" stroke="#000" stroke-width="2" />
<line x1="540" y1="700" x2="350" y2="640" stroke="#000" stroke-width="2" />
<circle cx="350" cy="640" r="4" fill="#2196F3"/> 
<circle cx="540" cy="580" r="4" fill="#2196F3"/> 
<circle cx="540" cy="700" r="4" fill="#2196F3"/> 
<rect x="350" y="580" width="190" height="120" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="350" cy="580" r="3" fill="#00f"/> 
<circle cx="540" cy="580" r="3" fill="#00f"/> 
<circle cx="350" cy="700" r="3" fill="#00f"/> 
<circle cx="540" cy="700" r="3" fill="#00f"/> 
<text x="0" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start">5. Relative m+l — same shape as absolute, pink</text> 
<line x1="60" y1="760" x2="210" y2="700" stroke="#E91E63" stroke-width="2" />
<line x1="210" y1="700" x2="360" y2="760" stroke="#E91E63" stroke-width="2" />
<circle cx="60" cy="760" r="4" fill="#2196F3"/> 
<circle cx="210" cy="700" r="4" fill="#2196F3"/> 
<circle cx="360" cy="760" r="4" fill="#2196F3"/> 
<rect x="60" y="700" width="300" height="60" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="60" cy="700" r="3" fill="#00f"/> 
<circle cx="360" cy="700" r="3" fill="#00f"/> 
<circle cx="60" cy="760" r="3" fill="#00f"/> 
<circle cx="360" cy="760" r="3" fill="#00f"/> 
<text x="0" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start"></text> 
<line x1="60" y1="760" x2="210" y2="700" stroke="#4CAF5066" stroke-width="2" />
<line x1="210" y1="700" x2="360" y2="760" stroke="#4CAF5066" stroke-width="2" />
<circle cx="60" cy="760" r="4" fill="#2196F3"/> 
<circle cx="210" cy="700" r="4" fill="#2196F3"/> 
<circle cx="360" cy="760" r="4" fill="#2196F3"/> 
<rect x="60" y="700" width="300" height="60" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="60" cy="700" r="3" fill="#00f"/> 
<circle cx="360" cy="700" r="3" fill="#00f"/> 
<circle cx="60" cy="760" r="3" fill="#00f"/> 
<circle cx="360" cy="760" r="3" fill="#00f"/> 
<text x="300" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start">6. Roundtrip — black=original, red=re-parsed (should match)</text> 
<path d="M360 200 C 420 100 580 100 640 200" stroke="#000" stroke-width="2" fill="none"/>
<line x1="640" y1="200" x2="360" y2="200" stroke="#000" stroke-width="2" />
<circle cx="360" cy="200" r="4" fill="#2196F3"/> 
<circle cx="640" cy="200" r="4" fill="#2196F3"/> 
<rect x="360" y="125" width="280" height="75" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="360" cy="125" r="3" fill="#00f"/> 
<circle cx="640" cy="125" r="3" fill="#00f"/> 
<circle cx="360" cy="200" r="3" fill="#00f"/> 
<circle cx="640" cy="200" r="3" fill="#00f"/> 
<text x="300" y="-8" fill="#333" font-size="11" font-family="Arial,sans-serif" text-anchor="start"></text> 
<path d="M360 200 C 420 100 580 100 640 200" stroke="#f4433666" stroke-width="2" fill="none"/>
<line x1="640" y1="200" x2="360" y2="200" stroke="#f4433666" stroke-width="2" />
<line x1="360" y1="200" x2="360" y2="200" stroke="#f4433666" stroke-width="2" />
<circle cx="360" cy="200" r="4" fill="#2196F3"/> 
<circle cx="640" cy="200" r="4" fill="#2196F3"/> 
<circle cx="360" cy="200" r="4" fill="#2196F3"/> 
<rect x="360" y="125" width="280" height="75" stroke="#00f" fill="none" stroke-width="1" />
<circle cx="360" cy="125" r="3" fill="#00f"/> 
<circle cx="640" cy="125" r="3" fill="#00f"/> 
<circle cx="360" cy="200" r="3" fill="#00f"/> 
<circle cx="640" cy="200" r="3" fill="#00f"/> 
</svg>
