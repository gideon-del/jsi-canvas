<line x1="0" y1="350" x2="700" y2="350" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="400" x2="700" y2="400" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="450" x2="700" y2="450" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="500" x2="700" y2="500" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="550" x2="700" y2="550" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="600" x2="700" y2="600" stroke="#eee" stroke-width="0.5" />
