<line x1="0" y1="50" x2="700" y2="50" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="100" x2="700" y2="100" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="150" x2="700" y2="150" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="200" x2="700" y2="200" stroke="#eee" stroke-width="0.5" />
<line x1="0" y1="250" x2="700" y2="250" stroke="#eee" stroke-width="0.5" />
